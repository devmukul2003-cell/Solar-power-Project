<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Energy Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-large">⚡</div>
                <h1>Get Started</h1>
                <p>Create your Smart Energy Dashboard account</p>
            </div>
            
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Min. 6 characters">
                </div>
                
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" required placeholder="City, State">
                </div>
                
                <div class="form-group">
                    <label for="solarCapacity">Solar Panel Capacity (kW)</label>
                    <input type="number" id="solarCapacity" name="solarCapacity" step="0.5" placeholder="e.g., 5">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required>
                        <span>I agree to the Terms & Conditions</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-auth">Create Account</button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="link">Login</a></p>
            </div>
        </div>
        
        <div class="auth-info">
            <h2>Join the Clean Energy Revolution</h2>
            <ul class="feature-list">
                <li>🌍 Support UN SDG 7</li>
                <li>💵 Save up to ₹3,000/month</li>
                <li>🌳 Reduce carbon footprint</li>
                <li>📈 Monitor in real-time</li>
            </ul>
        </div>
    </div>

    <script src="userAuthSystem.js"></script>
    <script src="auth.js"></script>
</body>
</html>
